<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-5</title>

    <!-- daisyUI + Tailwind CSS links -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font icon link -->

     <style>
        *{
             font-family: "Geist", sans-serif;

<body class="max-h-screen max-w-md bg-base-200 mx-auto">
    <header>
         <div class="logo  mx-auto pt-20 flex items-center justify-center  mb-4">
            <img src="./assets/github-logo.png" alt="GitHub Logo">
        </div>
        <div class="mx-auto text-center">
            <h2 class="text-[24px] font-semibold">GitHub Issue Tracker</h2>
            <p class="text-[#64748B] font-normal">Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box  border p-4">
            
            <label class="label text-lg font-bold">Username</label>
            <input id="input-username" type="text" class="input w-full" placeholder="Enter username" />
            <p class="text-primary">Default: admin</p>
            
            <label class="label text-lg font-bold">Password</label>
            <input id="input-password" type="password" class="input w-full" placeholder=" Enter Password" />
            <p class="text-primary">Default: admin123</p>

            <button id="sign-in btn" class="btn btn-primary rounded-md mt-4">Sign in</button>
        </fieldset>
    
        <hr class="my-6 border-base-300" />
         <div class="text-center">
            <p class="text-[#64748B] font-normal">Demo Credentials:</p>
        </div>
        <fieldset class="fieldset text-center mx-auto bg-base-100 border-base-300 rounded-box  border p-4">
            <p class="label text-center mx-auto">Username: admin</p>
            <p class="label text-center mx-auto">Password: admin123</p>
        </fieldset>
    </header>
    <main>
     
    </main>

        <script src="./script/sign in.js"></script>
</body>
</html>
